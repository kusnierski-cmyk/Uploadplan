<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Video Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --gold: #D4AF37; --gold-hover: #B8860B; }
        .bg-gold { background-color: var(--gold); }
        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F5E050 50%, #B8860B 100%); }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; transition: all 0.3s; }
        .btn-gold:hover { background: var(--gold-hover); transform: translateY(-2px); }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="border-b border-zinc-800 p-6 bg-zinc-950 sticky top-0 z-30">
        <h1 class="text-2xl font-black text-center tracking-tighter uppercase italic">
            Chef <span class="text-gold">Video Vault</span>
        </h1>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-10">
        
        <!-- Login Section -->
        <section id="authSection" class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 text-center shadow-2xl">
            <div class="mb-6 flex justify-center text-gold text-5xl">🔑</div>
            <h2 class="text-xl font-bold mb-4">Willkommen im Vault</h2>
            <button onclick="handleAuthClick()" class="btn-gold w-full py-4 rounded-xl shadow-lg flex items-center justify-center gap-3">
                Zutritt mit Google Drive
            </button>
        </section>

        <!-- Upload Form (Hidden) -->
        <section id="uploadForm" class="hidden space-y-6 animate-in fade-in duration-500">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4">
                <h2 class="text-gold font-bold uppercase tracking-widest text-sm">Neuer Upload</h2>
                
                <input type="file" id="videoFile" accept="video/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-zinc-800 file:text-gold hover:file:bg-zinc-700">
                
                <input type="text" id="title" placeholder="Titel eingeben..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-gold outline-none text-white">
                
                <textarea id="caption" rows="3" placeholder="Caption schreiben..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-gold outline-none text-white"></textarea>

                <div id="accountInputs" class="space-y-2">
                    <div class="flex gap-2">
                        <select class="account-select flex-1 bg-black border border-zinc-800 rounded-xl p-4 text-white outline-none">
                            <option>Hauptaccount</option>
                            <option>2. Account</option>
                            <option>YouTube</option>
                            <option>Instagram Acc 1</option>
                            <option>Instagram Acc 2</option>
                        </select>
                        <button onclick="addAccountField()" class="bg-zinc-800 text-gold px-5 rounded-xl font-bold text-2xl">+</button>
                    </div>
                </div>

                <button id="uploadBtn" onclick="startUploadProcess()" class="btn-gold w-full py-4 rounded-xl mt-4 shadow-xl uppercase tracking-widest">
                    Upload starten
                </button>
                
                <div id="progressUI" class="hidden space-y-2">
                    <div class="flex justify-between text-xs text-zinc-500 uppercase"><span id="statusInfo">Upload...</span><span id="percentInfo">0%</span></div>
                    <div class="w-full bg-zinc-800 rounded-full h-1.5"><div id="progressBar" class="bg-gold h-1.5 rounded-full transition-all" style="width: 0%"></div></div>
                </div>
            </div>

            <!-- Library Section -->
            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-gold font-bold uppercase tracking-widest text-sm">Deine Bibliothek</h2>
                    <button onclick="loadLibrary()" class="text-xs text-zinc-500 hover:text-white underline">Aktualisieren</button>
                </div>
                <div id="libraryGrid" class="grid grid-cols-2 gap-4">
                    <!-- Videos laden hier -->
                    <div class="col-span-2 text-center py-10 text-zinc-600 italic">Lade Bibliothek...</div>
                </div>
            </div>
        </section>

        <button id="signoutBtn" onclick="handleSignoutClick()" class="hidden w-full text-xs text-zinc-600 uppercase tracking-widest hover:text-red-500">Abmelden</button>
    </main>

    <!-- Detail Popup (Modal) -->
    <div id="videoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm animate-in fade-in duration-200">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full z-10">✕</button>
            <div id="modalContent" class="p-6 space-y-6">
                <!-- Inhalt dynamisch -->
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '816126303003-alj4h52nrdsko9u96tiftn4etj228i88.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCjsxob1ip3TFL42Z-Fc9PPNFQ20iBVMho';
        const FOLDER_NAME = "Video App Uploads";
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;

        // Init Google
        function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); }); }
        function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => { if (resp.error !== undefined) return; document.getElementById('authSection').classList.add('hidden'); document.getElementById('uploadForm').classList.remove('hidden'); document.getElementById('signoutBtn').classList.remove('hidden'); loadLibrary(); } }); }
        window.onload = () => { gapiLoaded(); gisLoaded(); };

        function handleAuthClick() { tokenClient.requestAccessToken({prompt: 'consent'}); }
        function handleSignoutClick() { const token = gapi.client.getToken(); if (token !== null) { google.accounts.oauth2.revoke(token.access_token); gapi.client.setToken(''); location.reload(); } }

        function addAccountField() {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<select class="account-select flex-1 bg-black border border-zinc-800 rounded-xl p-4 text-white"><option>Hauptaccount</option><option>2. Account</option><option>YouTube</option><option>Instagram Acc 1</option><option>Instagram Acc 2</option></select><button onclick="this.parentElement.remove()" class="bg-zinc-800 text-red-500 px-5 rounded-xl font-bold text-2xl">-</button>`;
            document.getElementById('accountInputs').appendChild(div);
        }

        async function getFolderId() {
            const resp = await gapi.client.drive.files.list({ q: `name = '${FOLDER_NAME}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false` });
            if (resp.result.files.length > 0) return resp.result.files[0].id;
            const folder = await gapi.client.drive.files.create({ resource: { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' });
            return folder.result.id;
        }

        async function startUploadProcess() {
            const fileInput = document.getElementById('videoFile');
            if (!fileInput.files[0]) return alert("Video wählen!");
            const btn = document.getElementById('uploadBtn');
            const progUI = document.getElementById('progressUI');
            btn.disabled = true; progUI.classList.remove('hidden');
            
            try {
                const folderId = await getFolderId();
                const file = fileInput.files[0];
                const title = document.getElementById('title').value || file.name;
                const caption = document.getElementById('caption').value;
                const accs = Array.from(document.querySelectorAll('.account-select')).map(s => s.value).join(', ');
                
                const metadata = { name: title, mimeType: file.type, parents: [folderId], description: `CAPTION: ${caption} | ACCOUNTS: ${accs}` };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                xhr.setRequestHeader('Authorization', 'Bearer ' + gapi.client.getToken().access_token);
                xhr.upload.onprogress = (e) => { const p = Math.round((e.loaded / e.total) * 100); document.getElementById('progressBar').style.width = p+'%'; document.getElementById('percentInfo').innerText = p+'%'; };
                xhr.onload = () => { alert("Erfolg!"); location.reload(); };
                xhr.send(form);
            } catch (e) { alert("Fehler!"); btn.disabled = false; }
        }

        async function loadLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '<div class="col-span-2 text-center text-zinc-500 animate-pulse">Lade Goldstücke...</div>';
            try {
                const folderId = await getFolderId();
                const resp = await gapi.client.drive.files.list({ 
                    q: `'${folderId}' in parents and trashed = false`, 
                    fields: 'files(id, name, description, thumbnailLink, createdTime, webContentLink)',
                    orderBy: 'createdTime desc'
                });
                const files = resp.result.files;
                grid.innerHTML = '';
                if (!files.length) grid.innerHTML = '<div class="col-span-2 text-center text-zinc-600">Keine Videos gefunden.</div>';
                files.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden cursor-pointer hover:border-gold transition-all active:scale-95";
                    div.onclick = () => openModal(f);
                    div.innerHTML = `
                        <div class="h-32 bg-black flex items-center justify-center relative">
                            ${f.thumbnailLink ? `<img src="${f.thumbnailLink}" class="w-full h-full object-cover opacity-50">` : ''}
                            <span class="absolute text-gold text-2xl">▶</span>
                        </div>
                        <div class="p-3 text-[10px] font-bold uppercase truncate">${f.name}</div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { grid.innerHTML = 'Fehler beim Laden.'; }
        }

        function openModal(f) {
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('modalContent');
            const desc = f.description || "";
            const caption = desc.split('|')[0]?.replace('CAPTION:', '').trim() || "";
            const accounts = desc.split('|')[1]?.replace('ACCOUNTS:', '').trim() || "Keine";

            content.innerHTML = `
                <div class="space-y-4">
                    <h3 class="text-gold font-black text-xl uppercase tracking-tighter">${f.name}</h3>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold">Caption</label>
                        <div class="flex gap-2">
                            <div id="copyCap" class="flex-1 bg-black p-3 rounded-lg text-sm text-zinc-300 border border-zinc-800">${caption || 'Keine Caption'}</div>
                            <button onclick="copyToClipboard('${caption}', this)" class="bg-zinc-800 text-gold px-4 rounded-lg text-xs font-bold uppercase">Copy</button>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold">Accounts</label>
                        <div class="flex flex-wrap gap-2">
                            ${accounts.split(',').map(a => `<span class="bg-gold/10 text-gold border border-gold/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${a.trim()}</span>`).join('')}
                        </div>
                    </div>

                    <div class="pt-4 flex flex-col gap-3">
                        <a href="${f.webContentLink}" target="_blank" class="btn-gold w-full py-4 rounded-xl text-center shadow-lg uppercase tracking-widest text-sm">Download Video</a>
                        <button onclick="deleteVideo('${f.id}')" class="text-red-800 text-[10px] font-bold uppercase tracking-widest hover:text-red-500 transition">Video löschen</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('videoModal').classList.add('hidden'); }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const oldText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.classList.replace('text-gold', 'text-white');
            setTimeout(() => { btn.innerText = oldText; btn.classList.replace('text-white', 'text-gold'); }, 2000);
        }

        async function deleteVideo(id) {
            if(confirm("Video wirklich aus Drive löschen?")) {
                await gapi.client.drive.files.delete({ fileId: id });
                closeModal();
                loadLibrary();
            }
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
