<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Video Vault</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --apple-bg: #F5F5F7; }
        body { 
            background-color: #FFFFFF; 
            color: #000000; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .apple-input {
            background: var(--apple-bg);
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .apple-input:focus {
            background: #ffffff;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .btn-gold {
            background: var(--gold);
            color: #ffffff;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gold:active { transform: scale(0.96); opacity: 0.8; }

        .video-card {
            background: #ffffff;
            border: 1px solid #E5E5E7;
            border-radius: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .video-card:active { transform: scale(0.95); background: var(--apple-bg); }

        .segmented-control {
            background: #EEEEF0;
            padding: 2px;
            border-radius: 14px;
        }
        .tab-active { 
            background: #ffffff; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
            color: #000 !important; 
        }

        ::-webkit-scrollbar { width: 0px; }
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen selection:bg-gold/20">

    <!-- Premium Apple Header -->
    <header class="glass-nav sticky top-0 z-40 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="icon-192.png" alt="Logo" class="w-10 h-10 rounded-xl shadow-sm border border-black/5">
            <div class="flex flex-col">
                <span class="text-[9px] uppercase tracking-[0.3em] text-zinc-400 font-bold">Vault System</span>
                <span class="text-sm font-extrabold tracking-tight">CHEF <span class="text-gold">VAULT</span></span>
            </div>
        </div>
        <div id="statusDot" class="w-2 h-2 rounded-full bg-zinc-200 transition-all duration-500"></div>
    </header>

    <main class="max-w-2xl mx-auto p-5 space-y-12">
        
        <!-- Auth Section -->
        <section id="authSection" class="flex flex-col items-center justify-center py-24 space-y-8 fade-up">
            <div class="relative">
                <div class="absolute inset-0 bg-gold blur-3xl opacity-20"></div>
                <img src="icon-192.png" class="relative w-24 h-24 rounded-[2.2rem] shadow-2xl">
            </div>
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-extrabold tracking-tight">Eingang gesperrt</h2>
                <p class="text-zinc-400 text-sm font-medium">Verifizieren Sie sich für den Zutritt</p>
            </div>
            <button onclick="handleAuthClick()" class="btn-gold px-14 py-4 rounded-2xl shadow-xl text-sm uppercase tracking-widest">
                Entsperren
            </button>
        </section>

        <!-- Main Interface -->
        <section id="uploadForm" class="hidden space-y-16 fade-up">
            
            <!-- Upload Area -->
            <div class="space-y-8">
                <div class="segmented-control flex text-[11px] font-bold uppercase tracking-wider text-zinc-500">
                    <button onclick="switchUploadTab('video')" id="tabUpVideo" class="flex-1 py-3 rounded-xl transition-all tab-active">Fertig</button>
                    <button onclick="switchUploadTab('raw')" id="tabUpRaw" class="flex-1 py-3 rounded-xl transition-all">Rohdaten</button>
                    <button onclick="switchUploadTab('sound')" id="tabUpSound" class="flex-1 py-3 rounded-xl transition-all">Sound</button>
                </div>

                <div class="bg-[#FBFBFD] rounded-[2.5rem] p-8 space-y-6 border border-zinc-100">
                    <div class="relative group">
                        <input type="file" id="videoFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="haptics()">
                        <div class="apple-input rounded-3xl p-10 text-center border-dashed border-2 border-zinc-200 flex flex-col items-center gap-3">
                            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm text-gold text-xl">＋</div>
                            <span class="text-zinc-400 text-xs font-bold uppercase tracking-widest" id="fileNameDisplay">Datei wählen</span>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <input type="text" id="title" placeholder="Titel" class="apple-input w-full p-5 rounded-2xl outline-none text-sm font-bold" oninput="haptics()">
                        <textarea id="caption" rows="2" placeholder="Caption / Beschreibung" class="apple-input w-full p-5 rounded-2xl outline-none text-sm font-medium resize-none" oninput="haptics()"></textarea>

                        <div id="accountFieldWrapper">
                            <div id="accountInputs" class="space-y-3">
                                <div class="flex gap-2">
                                    <select class="account-select flex-1 apple-input rounded-2xl p-5 text-sm font-bold outline-none appearance-none">
                                        <option>Hauptaccount TikTok</option>
                                        <option>2. Account TikTok</option>
                                        <option>YouTube</option>
                                        <option>Instagram Hauptaccount</option>
                                        <option>Instagram 2. Account</option>
                                    </select>
                                    <button onclick="addAccountField()" class="bg-zinc-100 text-gold w-16 rounded-2xl font-light text-2xl active:bg-zinc-200 shadow-sm">＋</button>
                                </div>
                            </div>
                        </div>

                        <button id="uploadBtn" onclick="startUploadProcess()" class="btn-gold w-full py-5 rounded-3xl shadow-2xl uppercase tracking-[0.2em] text-[11px] mt-4">Vault-Upload starten</button>
                        
                        <div id="progressUI" class="hidden pt-4 space-y-3">
                            <div class="w-full bg-zinc-100 rounded-full h-1 overflow-hidden"><div id="progressBar" class="bg-gold h-full transition-all duration-500 shadow-[0_0_10px_#D4AF37]" style="width: 0%"></div></div>
                            <div class="flex justify-between text-[9px] text-zinc-400 font-bold uppercase tracking-widest"><span id="statusInfo">Verschlüsseln...</span><span id="percentInfo">0%</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Library -->
            <div class="space-y-8">
                <div class="px-2">
                    <h2 class="text-3xl font-extrabold tracking-tight mb-6 italic">Mediathek</h2>
                    <div class="segmented-control flex text-[11px] font-bold uppercase tracking-wider text-zinc-500">
                        <button onclick="switchLibraryTab('video')" id="tabLibVideo" class="flex-1 py-3 rounded-xl transition-all tab-active">Videos</button>
                        <button onclick="switchLibraryTab('raw')" id="tabLibRaw" class="flex-1 py-3 rounded-xl transition-all">Rohdaten</button>
                        <button onclick="switchLibraryTab('sound')" id="tabLibSound" class="flex-1 py-3 rounded-xl transition-all">Sound</button>
                    </div>
                </div>
                
                <div id="libraryGrid" class="grid grid-cols-2 gap-5"></div>
            </div>

            <button onclick="handleSignoutClick()" class="w-full py-8 text-zinc-300 text-[10px] font-bold uppercase tracking-[0.4em] hover:text-red-500 transition-colors">Session beenden</button>
        </section>
    </main>

    <!-- Modal Detail View -->
    <div id="videoModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40 backdrop-blur-md animate-in fade-in duration-300">
        <div class="bg-white border-t sm:border border-zinc-100 w-full max-w-lg rounded-t-[3rem] sm:rounded-[3rem] overflow-hidden shadow-2xl relative max-h-[95vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-zinc-100 rounded-full mx-auto mt-4 mb-2 sm:hidden"></div>
            <button onclick="closeModal()" class="absolute top-6 right-6 bg-zinc-50 text-black w-10 h-10 rounded-full z-10 flex items-center justify-center font-light text-xl border border-black/5">✕</button>
            <div id="modalContent" class="p-8 pt-12 sm:p-12 space-y-10"></div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '816126303003-alj4h52nrdsko9u96tiftn4etj228i88.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCjsxob1ip3TFL42Z-Fc9PPNFQ20iBVMho';
        const MAIN_FOLDER_NAME = "Video App Uploads";
        const CATEGORIES = { video: "Fertige Videos", raw: "Rohmaterial", sound: "Tonaufnahmen" };
        let currentUploadTab = 'video';
        let currentLibraryTab = 'video';
        let tokenClient;

        function haptics() { if (window.navigator && window.navigator.vibrate) { window.navigator.vibrate(20); } }

        function switchUploadTab(type) {
            haptics(); currentUploadTab = type;
            ['Video', 'Raw', 'Sound'].forEach(t => document.getElementById('tabUp'+t).classList.remove('tab-active'));
            document.getElementById('tabUp'+type.charAt(0).toUpperCase() + type.slice(1)).classList.add('tab-active');
            document.getElementById('accountFieldWrapper').style.display = (type === 'video') ? 'block' : 'none';
        }

        function switchLibraryTab(type) {
            haptics(); currentLibraryTab = type;
            ['Video', 'Raw', 'Sound'].forEach(t => document.getElementById('tabLib'+t).classList.remove('tab-active'));
            document.getElementById('tabLib'+type.charAt(0).toUpperCase() + type.slice(1)).classList.add('tab-active');
            loadLibrary();
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }

        document.getElementById('videoFile')?.addEventListener('change', function(e) {
            haptics();
            const fileName = e.target.files[0]?.name || "Datei ausgewählt";
            document.getElementById('fileNameDisplay').innerText = fileName;
            document.getElementById('fileNameDisplay').style.color = '#D4AF37';
        });

        function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); checkExistingAuth(); }); }
        function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file', callback: (resp) => { saveToken(resp.access_token, resp.expires_in); showApp(); } }); }
        function saveToken(token, expiresIn) { localStorage.setItem('vault_token', token); localStorage.setItem('vault_token_expiry', Date.now() + (expiresIn * 1000)); }
        function checkExistingAuth() { const token = localStorage.getItem('vault_token'); const expiry = localStorage.getItem('vault_token_expiry'); if (token && expiry && Date.now() < expiry) { gapi.client.setToken({ access_token: token }); showApp(); } }
        function showApp() { document.getElementById('authSection').classList.add('hidden'); document.getElementById('uploadForm').classList.remove('hidden'); document.getElementById('statusDot').style.backgroundColor = '#D4AF37'; loadLibrary(); }
        function handleAuthClick() { haptics(); tokenClient.requestAccessToken({prompt: 'consent'}); }
        function handleSignoutClick() { haptics(); localStorage.removeItem('vault_token'); localStorage.removeItem('vault_token_expiry'); location.reload(); }
        window.onload = () => { gapiLoaded(); gisLoaded(); };

        function addAccountField() {
            haptics();
            const div = document.createElement('div');
            div.className = 'flex gap-2 animate-in slide-in-from-left duration-300';
            div.innerHTML = `<select class="account-select flex-1 apple-input rounded-2xl p-5 text-sm font-bold outline-none appearance-none"><option>Hauptaccount TikTok</option><option>2. Account TikTok</option><option>YouTube</option><option>Instagram Hauptaccount</option><option>Instagram 2. Account</option></select><button onclick="haptics(); this.parentElement.remove()" class="bg-zinc-50 text-red-500 w-16 rounded-2xl font-light text-2xl shadow-sm">－</button>`;
            document.getElementById('accountInputs').appendChild(div);
        }

        async function getFolder(name, parentId = null) {
            let q = `name = '${name}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false`;
            if (parentId) q += ` and '${parentId}' in parents`;
            const resp = await gapi.client.drive.files.list({ q: q });
            if (resp.result.files.length > 0) return resp.result.files[0].id;
            const res = await gapi.client.drive.files.create({ resource: { name: name, mimeType: 'application/vnd.google-apps.folder', parents: parentId ? [parentId] : [] }, fields: 'id' });
            return res.result.id;
        }

        async function startUploadProcess() {
            haptics();
            const fileInput = document.getElementById('videoFile');
            if (!fileInput.files[0]) return alert("Datei wählen!");
            const btn = document.getElementById('uploadBtn');
            const progUI = document.getElementById('progressUI');
            btn.disabled = true; progUI.classList.remove('hidden');
            
            try {
                const mainId = await getFolder(MAIN_FOLDER_NAME);
                const catId = await getFolder(CATEGORIES[currentUploadTab], mainId);
                const file = fileInput.files[0];
                const title = document.getElementById('title').value || file.name;
                const caption = document.getElementById('caption').value;
                const accs = (currentUploadTab === 'video') ? Array.from(document.querySelectorAll('.account-select')).map(s => s.value).join(', ') : 'N/A';
                
                const metadata = { name: title, mimeType: file.type, parents: [catId], description: `CAPTION: ${caption} | ACCOUNTS: ${accs}` };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                xhr.setRequestHeader('Authorization', 'Bearer ' + localStorage.getItem('vault_token'));
                xhr.upload.onprogress = (e) => { const p = Math.round((e.loaded / e.total) * 100); document.getElementById('progressBar').style.width = p+'%'; document.getElementById('percentInfo').innerText = p+'%'; };
                xhr.onload = () => { if(xhr.status === 200) { haptics(); location.reload(); } else { alert("Fehler!"); btn.disabled = false; }};
                xhr.send(form);
            } catch (e) { alert("Fehler!"); btn.disabled = false; }
        }

        async function loadLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '<div class="col-span-2 text-center text-zinc-300 py-24 text-[10px] uppercase tracking-widest animate-pulse font-black">Syncing Vault...</div>';
            try {
                const mainId = await getFolder(MAIN_FOLDER_NAME);
                const catId = await getFolder(CATEGORIES[currentLibraryTab], mainId);
                const resp = await gapi.client.drive.files.list({ q: `'${catId}' in parents and trashed = false`, fields: 'files(id, name, description, thumbnailLink, webContentLink, mimeType)', orderBy: 'createdTime desc' });
                const files = resp.result.files;
                grid.innerHTML = '';
                if (!files || !files.length) { grid.innerHTML = '<div class="col-span-2 text-center text-zinc-300 py-24 text-[10px] uppercase tracking-widest font-black">Vault Leer</div>'; return; }
                
                files.forEach(f => {
                    const isAudio = f.mimeType.includes('audio');
                    const div = document.createElement('div');
                    div.className = "video-card cursor-pointer active:scale-95 shadow-sm";
                    div.onclick = () => { haptics(); openModal(f); };
                    div.innerHTML = `
                        <div class="h-48 bg-zinc-50 flex items-center justify-center relative">
                            ${f.thumbnailLink ? `<img src="${f.thumbnailLink.replace('=s220', '=s800')}" class="w-full h-full object-cover">` : ''}
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-14 h-14 bg-white/90 rounded-full flex items-center justify-center shadow-xl backdrop-blur-md">
                                    <span class="text-gold text-2xl">${isAudio ? '🎙️' : '▶'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 text-[10px] font-black uppercase truncate text-black text-center tracking-tighter">${f.name}</div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { grid.innerHTML = 'Fehler.'; }
        }

        async function downloadFile(fileId, fileName, btn) {
            haptics(); const original = btn.innerHTML; btn.innerHTML = "<span>⏳</span>"; btn.disabled = true;
            try {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('vault_token') } });
                const blob = await response.blob(); const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = fileName; a.click();
                btn.innerHTML = original; btn.disabled = false; haptics();
            } catch (e) { alert("Fehler!"); btn.innerHTML = original; btn.disabled = false; }
        }

        function openModal(f) {
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('modalContent');
            const desc = f.description || "";
            const caption = desc.split('|')[0]?.replace('CAPTION:', '').trim() || "Keine Beschreibung";
            const accounts = desc.split('|')[1]?.replace('ACCOUNTS:', '').trim() || "N/A";

            content.innerHTML = `
                <div class="space-y-10 animate-in slide-in-from-bottom-10 duration-500">
                    <div class="text-center space-y-1">
                        <h3 class="text-gold font-black text-2xl uppercase tracking-tighter italic">Details</h3>
                        <p class="text-zinc-300 text-[9px] uppercase tracking-widest font-bold">Encrypted Vault Entry</p>
                    </div>
                    <div class="space-y-6">
                        <div class="space-y-2"><label class="text-[10px] text-zinc-400 uppercase font-black tracking-widest pl-1">Titel</label>
                        <div class="flex gap-2"><div class="flex-1 apple-input p-5 rounded-2xl text-sm text-black font-bold">${f.name}</div>
                        <button onclick="haptics(); copyToClipboard('${f.name.replace(/'/g, "\\'")}', this)" class="bg-zinc-50 text-gold px-6 rounded-2xl text-[10px] font-black uppercase">Copy</button></div></div>
                        <div class="space-y-2"><label class="text-[10px] text-zinc-400 uppercase font-black tracking-widest pl-1">Caption</label>
                        <div class="flex gap-2"><div class="flex-1 apple-input p-5 rounded-2xl text-sm text-zinc-600 leading-relaxed min-h-[100px]">${caption}</div>
                        <button onclick="haptics(); copyToClipboard('${caption.replace(/'/g, "\\'").replace(/\n/g, "\\n")}', this)" class="bg-zinc-50 text-gold px-6 rounded-2xl text-[10px] font-black uppercase">Copy</button></div></div>
                        ${accounts !== 'N/A' ? `<div class="space-y-2 text-center"><label class="text-[10px] text-zinc-400 uppercase font-black tracking-widest">Target Accounts</label>
                        <div class="bg-zinc-50 p-5 rounded-[2rem] flex flex-wrap gap-2 justify-center border border-zinc-100">${accounts.split(',').map(a => `<span class="bg-gold/10 text-gold border border-gold/10 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-tighter">${a.trim()}</span>`).join('')}</div></div>` : ''}
                    </div>
                    <div class="pt-6 flex flex-col gap-4">
                        <button onclick="downloadFile('${f.id}', '${f.name}', this)" class="btn-gold w-full py-6 rounded-3xl shadow-2xl uppercase tracking-widest text-[11px] flex items-center justify-center gap-3"><span>⬇</span> Download</button>
                        <button onclick="haptics(); deleteVideo('${f.id}')" class="text-zinc-300 text-[10px] font-bold uppercase tracking-[0.3em] py-4 hover:text-red-500 transition">Vault Eintrag löschen</button>
                    </div>
                </div>`;
            modal.classList.remove('hidden'); document.body.style.overflow = 'hidden';
        }

        function closeModal() { haptics(); document.getElementById('videoModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function copyToClipboard(text, btn) { navigator.clipboard.writeText(text).then(() => { const oldText = btn.innerText; btn.innerText = "COPIED"; btn.style.color = "#000"; setTimeout(() => { btn.innerText = oldText; btn.style.color = "#D4AF37"; }, 1500); }); }
        async function deleteVideo(id) { haptics(); if(confirm("Dauerhaft aus dem Vault entfernen?")) { await gapi.client.drive.files.delete({ fileId: id }); closeModal(); loadLibrary(); } }
    </script>
</body>
</html>
