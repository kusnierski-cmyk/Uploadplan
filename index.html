<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Video Vault</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root { --gold: #D4AF37; --gold-hover: #B8860B; }
        .bg-gold { background-color: var(--gold); }
        .text-gold { color: var(--gold); }
        .border-gold { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; transition: all 0.3s; }
        .btn-gold:hover { background: var(--gold-hover); transform: translateY(-2px); }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="border-b border-zinc-800 p-6 bg-zinc-950 sticky top-0 z-30">
        <h1 class="text-2xl font-black text-center tracking-tighter uppercase italic text-white">
            Chef <span class="text-gold">Video Vault</span>
        </h1>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-10">
        
        <!-- Login Section -->
        <section id="authSection" class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 text-center shadow-2xl">
            <div class="mb-6 flex justify-center text-gold text-5xl">🔑</div>
            <h2 class="text-xl font-bold mb-4">Vault gesperrt</h2>
            <button onclick="handleAuthClick()" class="btn-gold w-full py-4 rounded-xl shadow-lg flex items-center justify-center gap-3">
                Zutritt mit Google Drive
            </button>
        </section>

        <!-- Upload Form (Hidden) -->
        <section id="uploadForm" class="hidden space-y-6 animate-in fade-in duration-500">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4">
                <h2 class="text-gold font-bold uppercase tracking-widest text-sm text-center">Neuer Upload</h2>
                
                <input type="file" id="videoFile" accept="video/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-zinc-800 file:text-gold hover:file:bg-zinc-700">
                
                <input type="text" id="title" placeholder="Video Titel..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-gold outline-none text-white">
                
                <textarea id="caption" rows="3" placeholder="Beschreibung/Caption..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-gold outline-none text-white"></textarea>

                <div id="accountInputs" class="space-y-2">
                    <div class="flex gap-2">
                        <select class="account-select flex-1 bg-black border border-zinc-800 rounded-xl p-4 text-white outline-none">
                            <option>Hauptaccount</option>
                            <option>2. Account</option>
                            <option>YouTube</option>
                            <option>Instagram Acc 1</option>
                            <option>Instagram Acc 2</option>
                        </select>
                        <button onclick="addAccountField()" class="bg-zinc-800 text-gold px-5 rounded-xl font-bold text-2xl">+</button>
                    </div>
                </div>

                <button id="uploadBtn" onclick="startUploadProcess()" class="btn-gold w-full py-4 rounded-xl mt-4 shadow-xl uppercase tracking-widest">
                    Upload starten
                </button>
                
                <div id="progressUI" class="hidden space-y-2">
                    <div class="flex justify-between text-xs text-zinc-500 uppercase"><span id="statusInfo">Upload...</span><span id="percentInfo">0%</span></div>
                    <div class="w-full bg-zinc-800 rounded-full h-1.5"><div id="progressBar" class="bg-gold h-1.5 rounded-full transition-all" style="width: 0%"></div></div>
                </div>
            </div>

            <!-- Library Section -->
            <div class="space-y-4">
                <div class="flex justify-between items-center px-2 border-l-2 border-gold pl-3">
                    <h2 class="text-gold font-bold uppercase tracking-widest text-sm italic">Deine Mediathek</h2>
                    <button onclick="loadLibrary()" class="text-[10px] text-zinc-500 hover:text-white uppercase font-bold tracking-widest">Refresh</button>
                </div>
                <div id="libraryGrid" class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 text-center py-10 text-zinc-600 italic tracking-widest">Lade Vault-Inhalte...</div>
                </div>
            </div>
        </section>

        <button id="signoutBtn" onclick="handleSignoutClick()" class="hidden w-full text-[10px] text-zinc-700 uppercase tracking-[0.3em] font-bold hover:text-red-500 mt-10 transition-colors">Logout / Vault schließen</button>
    </main>

    <!-- Detail Popup (Modal) -->
    <div id="videoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-in fade-in duration-200">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl relative max-h-[90vh] overflow-y-auto shadow-[0_0_50px_rgba(212,175,55,0.1)]">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full z-10 flex items-center justify-center font-bold border border-zinc-800">✕</button>
            <div id="modalContent" class="p-6 space-y-6">
                <!-- Inhalt dynamisch -->
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '816126303003-alj4h52nrdsko9u96tiftn4etj228i88.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyCjsxob1ip3TFL42Z-Fc9PPNFQ20iBVMho';
        const FOLDER_NAME = "Video App Uploads";
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        let tokenClient;

        // Service Worker für PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
            });
        }

        // Init Google GAPI
        function gapiLoaded() { 
            gapi.load('client', async () => { 
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); 
                checkExistingAuth(); // Nach GAPI Init prüfen, ob Token vorhanden
            }); 
        }

        // Init Google GIS
        function gisLoaded() { 
            tokenClient = google.accounts.oauth2.initTokenClient({ 
                client_id: CLIENT_ID, 
                scope: SCOPES, 
                callback: (resp) => { 
                    if (resp.error !== undefined) return;
                    saveToken(resp.access_token, resp.expires_in);
                    showApp();
                } 
            }); 
        }

        // --- AUTH LOGIC ---
        function saveToken(token, expiresIn) {
            localStorage.setItem('vault_token', token);
            localStorage.setItem('vault_token_expiry', Date.now() + (expiresIn * 1000));
        }

        function checkExistingAuth() {
            const token = localStorage.getItem('vault_token');
            const expiry = localStorage.getItem('vault_token_expiry');

            if (token && expiry && Date.now() < expiry) {
                gapi.client.setToken({ access_token: token });
                showApp();
            }
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('uploadForm').classList.remove('hidden');
            document.getElementById('signoutBtn').classList.remove('hidden');
            loadLibrary();
        }

        function handleAuthClick() { 
            tokenClient.requestAccessToken({prompt: 'consent'}); 
        }

        function handleSignoutClick() { 
            const token = localStorage.getItem('vault_token');
            if (token) {
                google.accounts.oauth2.revoke(token);
                localStorage.removeItem('vault_token');
                localStorage.removeItem('vault_token_expiry');
                location.reload();
            }
        }

        window.onload = () => { gapiLoaded(); gisLoaded(); };

        // --- APP LOGIC ---
        function addAccountField() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 animate-in slide-in-from-left duration-200';
            div.innerHTML = `<select class="account-select flex-1 bg-black border border-zinc-800 rounded-xl p-4 text-white"><option>Hauptaccount</option><option>2. Account</option><option>YouTube</option><option>Instagram Acc 1</option><option>Instagram Acc 2</option></select><button onclick="this.parentElement.remove()" class="bg-zinc-800 text-red-500 px-5 rounded-xl font-bold text-2xl">-</button>`;
            document.getElementById('accountInputs').appendChild(div);
        }

        async function getFolderId() {
            try {
                const resp = await gapi.client.drive.files.list({ q: `name = '${FOLDER_NAME}' and mimeType = 'application/vnd.google-apps.folder' and trashed = false` });
                if (resp.result.files.length > 0) return resp.result.files[0].id;
                const folder = await gapi.client.drive.files.create({ resource: { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' });
                return folder.result.id;
            } catch (e) {
                if(e.status === 401) { handleSignoutClick(); } // Token abgelaufen
            }
        }

        async function startUploadProcess() {
            const fileInput = document.getElementById('videoFile');
            if (!fileInput.files[0]) return alert("Video wählen!");
            const btn = document.getElementById('uploadBtn');
            const progUI = document.getElementById('progressUI');
            btn.disabled = true; progUI.classList.remove('hidden');
            
            try {
                const folderId = await getFolderId();
                const file = fileInput.files[0];
                const title = document.getElementById('title').value || file.name;
                const caption = document.getElementById('caption').value;
                const accs = Array.from(document.querySelectorAll('.account-select')).map(s => s.value).join(', ');
                
                const metadata = { name: title, mimeType: file.type, parents: [folderId], description: `CAPTION: ${caption} | ACCOUNTS: ${accs}` };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
                xhr.setRequestHeader('Authorization', 'Bearer ' + localStorage.getItem('vault_token'));
                xhr.upload.onprogress = (e) => { 
                    const p = Math.round((e.loaded / e.total) * 100); 
                    document.getElementById('progressBar').style.width = p+'%'; 
                    document.getElementById('percentInfo').innerText = p+'%'; 
                };
                xhr.onload = () => { 
                    if(xhr.status === 200) { alert("Goldstück im Vault gesichert!"); location.reload(); }
                    else { alert("Fehler beim Upload. Bitte neu einloggen."); handleSignoutClick(); }
                };
                xhr.send(form);
            } catch (e) { alert("Fehler!"); btn.disabled = false; }
        }

        async function loadLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '<div class="col-span-2 text-center text-zinc-500 animate-pulse py-10 uppercase tracking-widest text-[10px]">Öffne Vault...</div>';
            try {
                const folderId = await getFolderId();
                const resp = await gapi.client.drive.files.list({ 
                    q: `'${folderId}' in parents and trashed = false`, 
                    fields: 'files(id, name, description, thumbnailLink, createdTime, webContentLink)',
                    orderBy: 'createdTime desc'
                });
                const files = resp.result.files;
                grid.innerHTML = '';
                if (!files.length) grid.innerHTML = '<div class="col-span-2 text-center text-zinc-600 py-10 uppercase tracking-widest text-[10px]">Vault leer.</div>';
                files.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden cursor-pointer hover:border-gold transition-all active:scale-95";
                    div.onclick = () => openModal(f);
                    div.innerHTML = `
                        <div class="h-32 bg-black flex items-center justify-center relative">
                            ${f.thumbnailLink ? `<img src="${f.thumbnailLink}" class="w-full h-full object-cover opacity-40">` : ''}
                            <div class="absolute inset-0 flex items-center justify-center bg-black/20"><span class="text-gold text-3xl opacity-80 hover:opacity-100">▶</span></div>
                        </div>
                        <div class="p-3 text-[10px] font-bold uppercase truncate text-zinc-400 text-center tracking-tighter">${f.name}</div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { grid.innerHTML = 'Vault Fehler.'; }
        }

        function openModal(f) {
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('modalContent');
            const desc = f.description || "";
            const caption = desc.split('|')[0]?.replace('CAPTION:', '').trim() || "";
            const accounts = desc.split('|')[1]?.replace('ACCOUNTS:', '').trim() || "Keine Auswahl";

            content.innerHTML = `
                <div class="space-y-6">
                    <h3 class="text-gold font-black text-2xl uppercase tracking-tighter italic text-center border-b border-zinc-800 pb-4">Vault Details</h3>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Titel</label>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-black p-4 rounded-xl text-sm text-white border border-zinc-800 font-medium">${f.name}</div>
                            <button onclick="copyToClipboard('${f.name.replace(/'/g, "\\'")}', this)" class="bg-zinc-800 text-gold px-4 rounded-xl text-[10px] font-black uppercase">Copy</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Caption</label>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-black p-4 rounded-xl text-sm text-zinc-300 border border-zinc-800 leading-relaxed">${caption}</div>
                            <button onclick="copyToClipboard('${caption.replace(/'/g, "\\'").replace(/\n/g, "\\n")}', this)" class="bg-zinc-800 text-gold px-4 rounded-xl text-[10px] font-black uppercase">Copy</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Accounts</label>
                        <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 flex flex-wrap gap-2">
                            ${accounts.split(',').map(a => `<span class="bg-gold/10 text-gold border border-gold/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">${a.trim()}</span>`).join('')}
                        </div>
                    </div>

                    <div class="pt-6 flex flex-col gap-4">
                        <a href="${f.webContentLink}" target="_blank" class="btn-gold w-full py-4 rounded-2xl text-center shadow-lg uppercase tracking-widest text-sm">⬇ Video Download</a>
                        <button onclick="deleteVideo('${f.id}')" class="text-red-900 text-[10px] font-bold uppercase tracking-[0.2em] py-2 hover:text-red-600 transition">[ Löschen ]</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('videoModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "OK";
                btn.classList.add('text-white');
                setTimeout(() => { btn.innerText = oldText; btn.classList.remove('text-white'); }, 1500);
            });
        }

        async function deleteVideo(id) {
            if(confirm("Video wirklich vernichten?")) {
                await gapi.client.drive.files.delete({ fileId: id });
                closeModal();
                loadLibrary();
            }
        }
    </script>
</body>
</html>
